<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Management</title>
  <link rel="icon" href="logo2.png" type="image/png">
  
  <style>
    :root {
      --primary-color: #2563eb;
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gradient);
    }

    .iframe-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      z-index: 5;
      background: transparent;
    }

    /* Loader Professional Style */
    #loader-container {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 20;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0, 0, 0, 0.1);
      border-top: 5px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    .loader-text {
      color: #334155;
      font-weight: 600;
      letter-spacing: 0.5px;
      font-size: 0.95rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Efek transisi halus saat iframe selesai load */
    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <div id="loader-container">
      <div class="spinner"></div>
      <div class="loader-text">Menyiapkan Aplikasi Password Management...</div>
    </div>

    <iframe 
      src="https://script.google.com/macros/s/AKfycbyGBWEKqQRAApdcXgXu5NjFlu8F2l6g4VAbpJ1_5IjwhQQE-U-4xitQGs9mIjyz9bKY/exec" 
      title="JNCfy Web App"
      id="appFrame"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    const iframe = document.getElementById('appFrame');
    const loader = document.getElementById('loader-container');

    // Mendeteksi ketika iframe selesai loading
    iframe.onload = function() {
      loader.classList.add('fade-out');
      // Berikan sedikit jeda sebelum benar-benar menghapus loader dari DOM
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500);
    };
  </script>

</body>
</html>
